<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockHub - 증권 정보 피드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-glass sticky top-0 border-b border-gray-100 z-50">
        <div class="max-w-6xl mx-auto px-5 h-16 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <h1 id="logo" class="text-[#3182F6] text-2xl font-black italic tracking-tighter cursor-pointer">StockHub</h1>
                <nav class="hidden md:flex gap-6 font-bold text-gray-500">
                    <a href="#" class="text-[#191F28]">홈</a>
                    <a href="#" class="hover:text-[#191F28]">실시간 차트</a>
                    <a href="#" class="hover:text-[#191F28]">테마별 정보</a>
                </nav>
            </div>
            <div class="flex items-center gap-4">
                <input type="text" placeholder="검색" class="bg-gray-100 px-4 py-2 rounded-xl text-sm hidden sm:block focus:outline-none">
                <div class="w-8 h-8 bg-gray-200 rounded-full"></div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-5 grid grid-cols-1 md:grid-cols-12 gap-6">
        <div class="md:col-span-8 space-y-6">
            <div id="index-cards" class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
                </div>

            <section class="card-white p-7">
                <h3 class="text-xl font-black mb-6">지금 뜨거운 테마 🔥</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="theme-container">
                    </div>
            </section>
        </div>

        <aside class="md:col-span-4 space-y-6">
            <div class="card-white p-6">
                <h3 class="font-black text-lg mb-5">실시간 인기 검색</h3>
                <div id="ranking-list" class="space-y-5">
                    </div>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
