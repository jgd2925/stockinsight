<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주식 - 토스 스타일</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #F2F4F6; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto min-h-screen pb-20">
        <header class="sticky top-0 bg-white/80 backdrop-blur-md px-5 py-4 flex justify-between items-center z-10">
            <h1 class="text-[#3182F6] text-2xl font-bold italic">toss</h1>
            <div class="flex gap-4 text-gray-400">🔍 🔔</div>
        </header>

        <div class="p-5 space-y-4">
            <section class="bg-white rounded-[28px] p-6 shadow-sm">
                <p class="text-gray-500 text-sm font-medium mb-1">내 자산</p>
                <div class="flex justify-between items-end">
                    <h2 class="text-2xl font-bold text-[#191F28]">12,450,000원</h2>
                    <span class="text-[#F04452] text-sm font-semibold">+2.4%</span>
                </div>
            </section>

            <section class="bg-white rounded-[28px] p-6 shadow-sm">
                <h3 class="font-bold text-lg mb-6 text-[#191F28]">관심 종목</h3>
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">🍎</div>
                            <div>
                                <p class="font-bold text-[#191F28]">애플</p>
                                <p class="text-xs text-gray-400">어제보다 1.2% 상승</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-[#191F28]">254,100원</p>
                            <p class="text-xs text-[#F04452]">+3,200원</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">🔋</div>
                            <div>
                                <p class="font-bold text-[#191F28]">테슬라</p>
                                <p class="text-xs text-gray-400">보합</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-[#191F28]">312,500원</p>
                            <p class="text-xs text-gray-400">0원</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
